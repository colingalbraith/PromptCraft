<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1A2D45 0%, #22374F 100%);
    font-family: 'Satoshi', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}
.glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 135, 46, 0.15) 0%, transparent 70%);
    top: -100px;
    right: -100px;
}
.glow2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 135, 46, 0.1) 0%, transparent 70%);
    bottom: -150px;
    left: -100px;
}
.content {
    text-align: center;
    z-index: 1;
}
.logo {
    width: 80px;
    height: 80px;
    border-radius: 18px;
    margin-bottom: 24px;
}
h1 {
    font-size: 56px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
}
.gradient {
    background: linear-gradient(135deg, #D4872E, #E5A83B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
p {
    font-size: 24px;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 500;
    margin-bottom: 32px;
}
.badge {
    display: inline-block;
    font-size: 16px;
    font-weight: 700;
    color: #D4872E;
    background: rgba(212, 135, 46, 0.12);
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid rgba(212, 135, 46, 0.2);
}
</style>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap">
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>
<div class="content">
    <img src="assets/icon128.png" class="logo" alt="">
    <h1>Sharper Prompts,<br><span class="gradient">Better Answers</span></h1>
    <p>Bad prompts, bad answers. PromptCraft fixes that in one click.</p>
    <span class="badge">Free &amp; Open Source Chrome Extension</span>
</div>
</body>
</html>
